<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shaw Arcade</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; min-height: 100%;
    background: #0b0b1e;
    color: #eef6ff;
    font-family: "Courier New", monospace;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    padding: 34px 18px 40px;
    background:
      radial-gradient(1200px 500px at 50% -10%, rgba(123,92,255,0.25), transparent 65%),
      #0b0b1e;
    min-height: 100vh;
  }
  /* starfield */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  header, main, footer { position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 34px; }
  .marquee {
    display: inline-block;
    border: 4px solid #ff2fd6;
    border-radius: 20px;
    padding: 18px 34px 14px;
    box-shadow: 0 0 22px rgba(255,47,214,0.45), inset 0 0 22px rgba(255,47,214,0.15);
    background: rgba(255,47,214,0.05);
  }
  h1 {
    margin: 0;
    font-size: clamp(30px, 7vw, 58px);
    letter-spacing: 6px;
    color: #00f7ff;
    text-shadow: 0 0 12px rgba(0,247,255,0.8), 0 0 40px rgba(0,247,255,0.35);
    animation: buzz 4s infinite;
  }
  @keyframes buzz {
    0%, 92%, 96%, 100% { opacity: 1; }
    94% { opacity: 0.55; }
  }
  .tag {
    margin-top: 8px;
    color: #ffd76e;
    font-size: clamp(13px, 2.6vw, 17px);
    letter-spacing: 3px;
  }

  main {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
    gap: 22px;
    width: 100%;
    max-width: 980px;
  }
  .card {
    display: flex; flex-direction: column;
    background: #131332;
    border: 3px solid var(--accent);
    border-radius: 22px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 35%, transparent);
    transition: transform .15s, box-shadow .15s;
  }
  .card:hover, .card:focus-visible {
    transform: translateY(-5px);
    box-shadow: 0 8px 28px color-mix(in srgb, var(--accent) 55%, transparent);
    outline: none;
  }
  .card:active { transform: translateY(-1px); }
  .art {
    height: 150px;
    display: flex; align-items: center; justify-content: center;
    background: var(--artbg);
    font-size: 72px;
  }
  .art canvas { width: 100%; height: 150px; display: block; }
  .info { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .info h2 {
    margin: 0; font-size: 22px; letter-spacing: 2px;
    color: var(--accent);
    text-shadow: 0 0 10px color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .info p { margin: 0; font-size: 14px; line-height: 1.5; color: #b9c4e8; flex: 1; }
  .playrow { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .badge { font-size: 11px; letter-spacing: 1px; color: #8f9bc4; }
  .playbtn {
    background: var(--accent);
    color: #0b0b1e;
    font-weight: bold;
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 1px;
    padding: 9px 22px;
    border-radius: 999px;
    box-shadow: 0 0 14px color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .card.soon {
    border-style: dashed;
    opacity: 0.75;
    cursor: default;
  }
  .card.soon .playbtn { background: #3a3a5e; color: #8f9bc4; box-shadow: none; }

  footer {
    margin-top: 36px;
    color: #8f9bc4;
    font-size: 13px;
    letter-spacing: 1px;
    text-align: center;
  }
  @media (prefers-reduced-motion: reduce) {
    h1 { animation: none; }
    .card, .card:hover { transition: none; transform: none; }
  }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<header>
  <div class="marquee">
    <h1>TAKASHI'S ARCADE</h1>
    <div class="tag">★ PICK A GAME ★</div>
  </div>
</header>

<main id="games"></main>

<footer>New games appear here as they're built. Bookmark this page!</footer>

<script>
(() => {
'use strict';
// ============================================================
// ADD NEW GAMES HERE. One entry = one card on the portal.
//   art: 'blob' | 'ship' | any emoji string (used for future games)
// ============================================================
const GAMES = [
  {
    title: 'BLOB MAZE',
    url: 'https://shaw-arcade.github.io/blob-maze/',
    desc: '50 mazes, keys, magic gates, and a blob you dress up as you win. Make your own player and race the clock.',
    badge: 'AGES 4+ · TOUCH + KEYS',
    accent: '#ff8fc7',
    artbg: 'linear-gradient(160deg, #f6ecff, #e2c7ff)',
    art: 'blob'
  },
  {
    title: 'NEON DODGE',
    url: 'https://shaw-arcade.github.io/neon-dodge/',
    desc: 'Fly your ship through a storm of neon shapes. Every dodge is a point, and it only gets faster. Two shields per run.',
    badge: 'AGES 6+ · TOUCH + KEYS',
    accent: '#00f7ff',
    artbg: 'linear-gradient(160deg, #05050f, #101033)',
    art: 'ship'
  },
  {
    title: 'NEXT GAME',
    url: 'create/',
    desc: 'This spot is saved for YOUR idea. Step into the Game Lab, dream up a game, and send it to the arcade builder!',
    badge: 'YOUR IMAGINATION',
    accent: '#ffd76e',
    artbg: 'linear-gradient(160deg, #1a1a3e, #131332)',
    art: '💡',
    btn: 'CREATE ✏️'
  }
];

// ---------- card art drawn in canvas (no image files needed) ----------
function drawBlobArt(ctx, W, H){
  const s = H*0.72, cx = W/2, cy = H*0.62;
  // little maze walls behind
  ctx.strokeStyle = 'rgba(138,79,211,0.35)'; ctx.lineWidth = 6; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(W*0.08,H*0.25); ctx.lineTo(W*0.3,H*0.25); ctx.lineTo(W*0.3,H*0.6);
  ctx.moveTo(W*0.72,H*0.8); ctx.lineTo(W*0.92,H*0.8); ctx.moveTo(W*0.82,H*0.15); ctx.lineTo(W*0.82,H*0.45);
  ctx.stroke();
  // star goal
  ctx.fillStyle = '#ffd76e';
  star(ctx, W*0.85, H*0.62, 11);
  // blob body
  const g = ctx.createLinearGradient(0, cy-s*0.5, 0, cy+s*0.4);
  g.addColorStop(0,'#ffd3ea'); g.addColorStop(1,'#ffa7cd');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(cx-s*0.5, cy+s*0.32);
  ctx.bezierCurveTo(cx-s*0.62, cy-s*0.28, cx-s*0.32, cy-s*0.56, cx, cy-s*0.56);
  ctx.bezierCurveTo(cx+s*0.32, cy-s*0.56, cx+s*0.62, cy-s*0.28, cx+s*0.5, cy+s*0.32);
  ctx.quadraticCurveTo(cx, cy+s*0.52, cx-s*0.5, cy+s*0.32);
  ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.ellipse(cx-s*0.2, cy-s*0.34, s*0.14, s*0.08, -0.5, 0, 7); ctx.fill();
  // face
  ctx.fillStyle='#3a2a4d';
  for (const sx of [-1,1]){
    ctx.beginPath(); ctx.arc(cx+sx*s*0.17, cy-s*0.08, s*0.09, 0, 7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+sx*s*0.17-3, cy-s*0.08-3, s*0.03, 0, 7); ctx.fill();
    ctx.fillStyle='#3a2a4d';
  }
  ctx.strokeStyle='#3a2a4d'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(cx, cy+s*0.1, s*0.09, 0.3, Math.PI-0.3); ctx.stroke();
  // bow
  ctx.fillStyle='#ff6fb0';
  for (const sx of [-1,1]){
    ctx.beginPath(); ctx.moveTo(cx+sx*s*0.05, cy-s*0.52);
    ctx.lineTo(cx+sx*s*0.26, cy-s*0.66); ctx.lineTo(cx+sx*s*0.26, cy-s*0.42);
    ctx.closePath(); ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx, cy-s*0.52, s*0.06, 0, 7); ctx.fill();
}
function drawShipArt(ctx, W, H){
  // neon grid
  ctx.strokeStyle='rgba(0,247,255,0.12)'; ctx.lineWidth=1;
  for (let x=0; x<W; x+=26){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=26){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  // obstacles
  const shapes=[[W*0.15,H*0.3,14,3,'#ff2fd6'],[W*0.8,H*0.22,12,4,'#ffb300'],[W*0.7,H*0.75,15,5,'#a6ff00'],[W*0.25,H*0.78,10,6,'#ff3355']];
  for (const [x,y,r,sides,col] of shapes){
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.shadowColor=col; ctx.shadowBlur=10;
    ctx.beginPath();
    for (let i=0;i<sides;i++){ const a=i/sides*Math.PI*2;
      i?ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r); }
    ctx.closePath(); ctx.stroke();
  }
  // ship
  const cx=W/2, cy=H/2, r=20;
  ctx.strokeStyle='#00f7ff'; ctx.fillStyle='rgba(0,247,255,0.15)';
  ctx.lineWidth=3; ctx.shadowColor='#00f7ff'; ctx.shadowBlur=18;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(Math.PI/2);
  ctx.beginPath();
  ctx.moveTo(0,-r*1.4); ctx.lineTo(r,r); ctx.lineTo(0,r*0.5); ctx.lineTo(-r,r);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.shadowBlur=0;
}
function star(ctx,x,y,r){
  ctx.save(); ctx.translate(x,y); ctx.beginPath();
  for (let i=0;i<10;i++){ const a=i*Math.PI/5-Math.PI/2, rr=i%2?r*0.45:r;
    i?ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr); }
  ctx.closePath(); ctx.fill(); ctx.restore();
}

// ---------- build cards ----------
const main = document.getElementById('games');
for (const g of GAMES){
  const el = document.createElement(g.soon ? 'div' : 'a');
  el.className = 'card' + (g.soon ? ' soon' : '');
  el.style.setProperty('--accent', g.accent);
  el.style.setProperty('--artbg', g.artbg);
  if (!g.soon){ el.href = g.url; }
  const artHtml = (g.art==='blob'||g.art==='ship')
    ? '<canvas width="600" height="300"></canvas>'
    : '<span>'+g.art+'</span>';
  el.innerHTML = `
    <div class="art">${artHtml}</div>
    <div class="info">
      <h2>${g.title}</h2>
      <p>${g.desc}</p>
      <div class="playrow">
        <span class="badge">${g.badge}</span>
        <span class="playbtn">${g.soon ? 'SOON' : (g.btn || 'PLAY ▶')}</span>
      </div>
    </div>`;
  main.appendChild(el);
  const cv = el.querySelector('canvas');
  if (cv){
    const ctx = cv.getContext('2d');
    if (g.art==='blob'){ ctx.fillStyle='#f0e2ff'; drawBlobArt(ctx, 600, 300); }
    if (g.art==='ship'){ drawShipArt(ctx, 600, 300); }
  }
}

// ---------- ambient starfield ----------
const sc = document.getElementById('stars'), sctx = sc.getContext('2d');
let stars = [];
function sizeStars(){
  sc.width = innerWidth * devicePixelRatio; sc.height = innerHeight * devicePixelRatio;
  stars = Array.from({length: 70}, () => ({
    x: Math.random()*sc.width, y: Math.random()*sc.height,
    r: (Math.random()*1.4+0.4)*devicePixelRatio, tw: Math.random()*Math.PI*2
  }));
}
sizeStars();
addEventListener('resize', sizeStars);
const still = matchMedia('(prefers-reduced-motion: reduce)').matches;
function tick(t){
  sctx.clearRect(0,0,sc.width,sc.height);
  for (const s of stars){
    const a = still ? 0.5 : 0.25 + 0.3*Math.sin(t/900 + s.tw);
    sctx.fillStyle = 'rgba(255,255,255,'+a.toFixed(2)+')';
    sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, 7); sctx.fill();
  }
  if (!still) requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
})();
</script>
</body>
</html>
